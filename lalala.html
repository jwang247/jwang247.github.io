<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>标题标签</title>
	</head>
	<body>
		<form>
			昵称：<input type="text"/><br>
			密码：<input type="password"/><br>
			你是从哪了解到的Boring Club：
			<select>
				<option>丰兮介绍的</option>
				<option>吴兮介绍的</option>
				<option>相信我们的项目自己来的</option>
			</select><br>
			性别：<input type="radio" name="gender" value="男"/>男
			<input type="radio" name="gender" value="女"/>女<br>
			爱好：<input type="checkbox" name="hobby" value="bike"/>bike
			<input type="checkbox" name="hobby" value="swim"/>swim<br>
			个人简介：<textarea></textarea>
			上传个人照片：<input type="file"/>
		</form>
		<a href="https://twitter.com/boringclub_NFT" target="_blank"><img src="../img/boringclub.png"/></a>
		<p>点击图片跳转到推特主页></p>
